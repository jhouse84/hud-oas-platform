  # ======================================================================
  # Lambda: VDR / Docs
  # ======================================================================
  FnDocsPresignDownload:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'hsg-${Stage}-docs-presign-download'
      CodeUri: src/
      Handler: handlers/docs/presignDownload.handler
      Timeout: 30          # on-demand per-bidder PDF stamping
      MemorySize: 1024
      Policies:
        - S3ReadPolicy: { BucketName: !Ref DocsBucket }
        - DynamoDBCrudPolicy: { TableName: !Ref AccessLogTable }
        - DynamoDBReadPolicy: { TableName: !Ref BiddersTable }
        - DynamoDBReadPolicy: { TableName: !Ref SalesTable }
        - Statement:
            - Effect: Allow
              Action: [s3:PutObject]
              Resource: !Sub 'arn:aws:s3:::hsg-${Stage}-docs-${AWS::AccountId}/watermarked/*'
            - Effect: Allow
              Action: [kms:Decrypt, kms:GenerateDataKey]
              Resource: !GetAtt KmsKey.Arn
      Events:
        HttpDownload:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /docs/presign-download
            Auth: { Authorizer: CognitoJwt }

  FnDocsPresignUpload:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'hsg-${Stage}-docs-presign-upload'
      CodeUri: src/
      Handler: handlers/docs/presignUpload.handler
      Timeout: 10
      Policies:
        - S3WritePolicy: { BucketName: !Ref DocsBucket }
        - DynamoDBReadPolicy: { TableName: !Ref BiddersTable }
        - Statement:
            - Effect: Allow
              Action: [kms:Decrypt, kms:GenerateDataKey, kms:Encrypt]
              Resource: !GetAtt KmsKey.Arn
      Events:
        HttpUpload:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /docs/presign-upload
            Auth: { Authorizer: CognitoJwt }

  FnDocsList:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'hsg-${Stage}-docs-list'
      CodeUri: src/
      Handler: handlers/docs/list.handler
      Policies:
        - S3ReadPolicy: { BucketName: !Ref DocsBucket }
      Events:
        HttpList:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: GET
            Path: /sales/{saleId}/docs
            Auth: { Authorizer: CognitoJwt }

  FnAccessLog:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'hsg-${Stage}-access-log'
      CodeUri: src/
      Handler: handlers/docs/accessLog.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref AccessLogTable }
      Events:
        HttpLog:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /access-log
            Auth: { Authorizer: CognitoJwt }

  # Watermark Lambda — decoupled from DocsBucket via literal ARN to avoid
  # CloudFormation circular dependency (bucket → permission → fn → role → bucket).
  # The S3 NotificationConfiguration is wired by a separate custom resource
  # (SAM auto-generates it) but using the literal bucket name for policies.
  FnDocsWatermark:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'hsg-${Stage}-docs-watermark'
      CodeUri: src/
      Handler: handlers/docs/watermark.handler
      Timeout: 60
      MemorySize: 1024
      Policies:
        - Statement:
            - Effect: Allow
              Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
              Resource:
                - !Sub 'arn:aws:s3:::hsg-${Stage}-docs-${AWS::AccountId}'
                - !Sub 'arn:aws:s3:::hsg-${Stage}-docs-${AWS::AccountId}/*'
            - Effect: Allow
              Action: [kms:Decrypt, kms:GenerateDataKey, kms:Encrypt]
              Resource: !GetAtt KmsKey.Arn

  FnDocsWatermarkInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt FnDocsWatermark.Arn
      Principal: s3.amazonaws.com
      SourceArn: !Sub 'arn:aws:s3:::hsg-${Stage}-docs-${AWS::AccountId}'
      SourceAccount: !Ref AWS::AccountId

