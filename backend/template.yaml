          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /screenings/tin
            Auth: { Authorizer: NONE }

  # ======================================================================
  # Lambda: Notifications (NEW — in-app feed)
  # ======================================================================
  FnNotificationsList:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'hsg-${Stage}-notifications-list'
      CodeUri: src/
      Handler: handlers/notifications/list.handler
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref NotificationsTable }
      Events:
        HttpList:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: GET
            Path: /notifications
            Auth: { Authorizer: CognitoJwt }

  FnNotificationsRead:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'hsg-${Stage}-notifications-read'
      CodeUri: src/
      Handler: handlers/notifications/markRead.handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
      Events:
        HttpRead:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /notifications/{notifId}/read
            Auth: { Authorizer: CognitoJwt }
        HttpReadAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: POST
            Path: /notifications/mark-all-read
            Auth: { Authorizer: CognitoJwt }

  # ======================================================================
  # CloudFront distribution (frontend + API under one domain)
  # ======================================================================
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'hsg-${Stage}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ---------------------------------------------------------------
  # Edge protection — WAF on the distribution (audit S-4)
  # ---------------------------------------------------------------
  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub 'hsg-${Stage}-edge-acl'
      Scope: CLOUDFRONT
      DefaultAction: { Allow: {} }
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub 'hsg-${Stage}-edge-acl'
      Rules:
        - Name: AWSCommonRuleSet
          Priority: 0
          OverrideAction: { None: {} }
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig: { SampledRequestsEnabled: true, CloudWatchMetricsEnabled: true, MetricName: common }
        - Name: AWSKnownBadInputs
          Priority: 1
          OverrideAction: { None: {} }
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig: { SampledRequestsEnabled: true, CloudWatchMetricsEnabled: true, MetricName: badinputs }
        - Name: AWSIpReputation
          Priority: 2
          OverrideAction: { None: {} }
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig: { SampledRequestsEnabled: true, CloudWatchMetricsEnabled: true, MetricName: iprep }
        - Name: RateLimitPerIp
          Priority: 3
          Action: { Block: {} }
          Statement:
            RateBasedStatement:
              Limit: 1000          # per 5 minutes per IP — generous for bidders, stops floods
              AggregateKeyType: IP
          VisibilityConfig: { SampledRequestsEnabled: true, CloudWatchMetricsEnabled: true, MetricName: ratelimit }

  # ---------------------------------------------------------------
  # Audit trail — CloudTrail to a locked bucket (audit S-6)
  # ---------------------------------------------------------------
  AuditTrailBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'hsg-${Stage}-audit-trail-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      VersioningConfiguration: { Status: Enabled }
      LifecycleConfiguration:
        Rules:
          - Id: RetainSevenYears
            Status: Enabled
            Transitions:
              - { StorageClass: GLACIER, TransitionInDays: 365 }
            ExpirationInDays: 2557   # ~7 years per federal retention posture
      Tags:
        - { Key: Project, Value: HUD-OAS-Platform }
        - { Key: Stage,   Value: !Ref Stage }

  AuditTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AuditTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudTrailAclCheck
            Effect: Allow
            Principal: { Service: cloudtrail.amazonaws.com }
            Action: s3:GetBucketAcl
            Resource: !GetAtt AuditTrailBucket.Arn
          - Sid: CloudTrailWrite
            Effect: Allow
            Principal: { Service: cloudtrail.amazonaws.com }
            Action: s3:PutObject
            Resource: !Sub '${AuditTrailBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals: { 's3:x-amz-acl': bucket-owner-full-control }
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource: [!GetAtt AuditTrailBucket.Arn, !Sub '${AuditTrailBucket.Arn}/*']
            Condition:
              Bool: { 'aws:SecureTransport': 'false' }

  AuditTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: AuditTrailBucketPolicy
    Properties:
      TrailName: !Sub 'hsg-${Stage}-trail'
      S3BucketName: !Ref AuditTrailBucket
      IsLogging: true
      IsMultiRegionTrail: true
      IncludeGlobalServiceEvents: true
      EnableLogFileValidation: true
      Tags:
        - { Key: Project, Value: HUD-OAS-Platform }
        - { Key: Stage,   Value: !Ref Stage }

  # ---------------------------------------------------------------
  # Alerting — SNS + alarms on the bid-critical path (audit S-7)
  # ---------------------------------------------------------------
  OpsAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'hsg-${Stage}-ops-alerts'
      KmsMasterKeyId: alias/aws/sns

  OpsAlertEmail:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OpsAlertTopic
      Protocol: email
      Endpoint: !Ref AdminEmail

  AlarmBidsSubmitErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'hsg-${Stage}-bids-submit-errors'
      AlarmDescription: Any error on bid submission — the bid-day critical path
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{ Name: FunctionName, Value: !Sub 'hsg-${Stage}-bids-submit' }]
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OpsAlertTopic]

  AlarmPresignErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'hsg-${Stage}-presign-errors'
      AlarmDescription: VDR download path failing
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{ Name: FunctionName, Value: !Sub 'hsg-${Stage}-docs-presign-download' }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OpsAlertTopic]

  AlarmBiddersCreateErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'hsg-${Stage}-bidders-create-errors'
      AlarmDescription: Public qualification intake failing
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{ Name: FunctionName, Value: !Sub 'hsg-${Stage}-bidders-create' }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OpsAlertTopic]

  AlarmApi5xx:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'hsg-${Stage}-api-5xx'
      AlarmDescription: API Gateway server errors
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions: [{ Name: ApiId, Value: !Ref HttpApi }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OpsAlertTopic]

  AlarmLambdaThrottles:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'hsg-${Stage}-lambda-throttles'
      AlarmDescription: Any function throttling account-wide
      Namespace: AWS/Lambda
      MetricName: Throttles
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref OpsAlertTopic]

  # Explicit security-headers policy (the prior managed ID was a CORS policy,
  # so no security headers were actually being served). Audit S-2.
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub 'hsg-${Stage}-security-headers'
        Comment: HSTS, CSP, frame/nosniff/referrer/permissions for the OAS platform
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions: { Override: true }
          FrameOptions: { FrameOption: DENY, Override: true }
          ReferrerPolicy: { ReferrerPolicy: strict-origin-when-cross-origin, Override: true }
          ContentSecurityPolicy:
            Override: true
            ContentSecurityPolicy: !Sub "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://*.execute-api.${AWS::Region}.amazonaws.com https://cognito-idp.${AWS::Region}.amazonaws.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
        CustomHeadersConfig:
          Items:
            - Header: Permissions-Policy
              Value: "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
              Override: true

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100   # US + EU only (cheapest)
        WebACLId: !GetAtt WebAcl.Arn
        Aliases: !If [UseCustomDomain, [!Ref DomainName], !Ref 'AWS::NoValue']
        ViewerCertificate: !If
          - UseCustomDomain
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Static
            DomainName: !GetAtt StaticBucket.RegionalDomainName
            S3OriginConfig: { OriginAccessIdentity: '' }
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
          - Id: ApiOrigin
            DomainName: !Sub '${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: S3Static
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6   # CachingOptimized
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad   # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac   # AllViewerExceptHostHeader
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
        CustomErrorResponses:
          - { ErrorCode: 403, ResponseCode: 200, ResponsePagePath: /index.html, ErrorCachingMinTTL: 60 }
          - { ErrorCode: 404, ResponseCode: 200, ResponsePagePath: /index.html, ErrorCachingMinTTL: 60 }
      Tags:
        - { Key: Project, Value: HUD-OAS-Platform }
        - { Key: Stage,   Value: !Ref Stage }

  StaticBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${StaticBucket}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # DomainRecord managed outside template for stage-1 deploy. Once zone exists
  # and custom domain is enabled, add a Route53 alias A record pointing to
  # CloudFrontDistribution.DomainName.

Outputs:
  ApiEndpoint:
    Description: HTTP API invoke URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  CloudFrontDomain:
    Description: CloudFront distribution domain
    Value: !GetAtt CloudFrontDistribution.DomainName
  CustomDomain:
    Description: Custom domain for the platform
    Value: !Sub 'https://${DomainName}'
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
  DocsBucket:
    Description: VDR documents bucket
    Value: !Ref DocsBucket
  StaticBucket:
    Description: Frontend static assets bucket
    Value: !Ref StaticBucket
  KmsKeyAlias:
    Description: KMS key alias for CMK encryption
    Value: !Ref KmsKeyAlias
