<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bidder Portal · HUD Commercial Loan Sales</title>
  <link rel="stylesheet" href="../shared/design-system.css" />
  <script src="../shared/config.js"></script>
  <style>
    .app-shell { display: grid; grid-template-columns: 256px 1fr; min-height: 100vh; }
    .sidebar { background: linear-gradient(180deg, var(--color-portal-dark) 0%, var(--color-ink) 130%); color: rgba(255,255,255,0.82); padding: var(--space-5) var(--space-3); box-shadow: 6px 0 24px rgba(16,24,40,0.10); position: relative; z-index: 2; }
    .sidebar__brand { padding: 0 var(--space-3) var(--space-5); border-bottom: 1px solid rgba(255,255,255,0.09); margin-bottom: var(--space-4); }
    .sidebar__brand-label { font-family: var(--font-mono); font-size: var(--text-xs); letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
    .sidebar__brand-name { font-family: var(--font-heading); font-size: var(--text-xl); color: #FFF; margin-top: 4px; letter-spacing: -0.01em; }
    .sidebar__nav-item { display: flex; align-items: center; gap: 9px; padding: 10px 14px; margin: 2px 0; border-radius: 10px; color: rgba(255,255,255,0.72); cursor: pointer; transition: background var(--duration-base) var(--ease-out), color var(--duration-base) var(--ease-out); font-size: 14px; font-weight: 500; }
    .sidebar__nav-item:hover { background: rgba(255,255,255,0.07); color: #FFF; }
    .sidebar__nav-item.active { background: rgba(255,255,255,0.13); color: #FFF; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
    .sidebar__user { padding: var(--space-4) var(--space-6); margin-top: var(--space-8); border-top: 1px solid rgba(255,255,255,0.1); font-size: var(--text-sm); }
    .main { padding: 0; overflow-y: auto; }
    .main__header { padding: var(--space-5) var(--space-8); border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.86); backdrop-filter: saturate(140%) blur(6px); position: sticky; top: 0; z-index: 5; }
    .main__title { font-family: var(--font-heading); font-size: var(--text-2xl); color: var(--color-ink); letter-spacing: -0.01em; }
    .main__content { padding: var(--space-6) var(--space-8); }
    .data-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
    .data-table th { text-align: left; padding: var(--space-2) var(--space-3); font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); text-transform: uppercase; letter-spacing: 0.05em; }
    .data-table td { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--color-grey-100); }
    .badge { padding: var(--space-1) var(--space-2); border-radius: var(--radius-full); font-family: var(--font-mono); font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.06em; background: var(--color-grey-100); }
    .badge--active { background: var(--color-info-bg); color: var(--color-info); }
    .badge--closed { background: var(--color-grey-200); color: var(--color-text-muted); }
    .tabs { display: flex; gap: var(--space-2); border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-6); }
    .tabs__item { padding: var(--space-3) var(--space-4); cursor: pointer; border-bottom: 2px solid transparent; font-family: var(--font-mono); font-size: var(--text-sm); letter-spacing: 0.04em; text-transform: uppercase; color: var(--color-text-muted); }
    .tabs__item.active { border-color: var(--color-portal); color: var(--color-portal); }
    .empty { padding: var(--space-12); text-align: center; color: var(--color-text-muted); }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
    .stat-card { padding: var(--space-4); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); }
    .stat-card__label { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-muted); letter-spacing: 0.06em; }
    .stat-card__value { font-family: var(--font-heading); font-size: var(--text-2xl); margin-top: var(--space-1); }
    .sale-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: var(--space-4); }
  </style>
</head>
<body data-portal="commercial">

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__brand-label">Commercial</div>
        <div class="sidebar__brand-name">Bidder Portal</div>
      </div>
      <nav>
        <a class="sidebar__nav-item" data-route="#/sales">Active deals</a>
        <a class="sidebar__nav-item" data-route="#/my-bids">My bids</a>
        <a class="sidebar__nav-item" data-route="#/settlements">Settlements</a>
        <a class="sidebar__nav-item" data-route="#/notifications">Notifications <span id="notif-count" style="float: right; background: var(--color-error); color: #FFF; padding: 0 var(--space-2); border-radius: var(--radius-full); font-size: var(--text-xs); display: none;"></span></a>
      </nav>
      <div class="sidebar__user">
        <div id="user-name" style="color: #FFF; font-weight: 600;">…</div>
        <div id="user-email" style="font-size: var(--text-xs); opacity: 0.7;"></div>
        <a href="#" id="signout-link" style="display: inline-block; margin-top: var(--space-2); color: var(--color-portal-bright); text-decoration: underline; font-size: var(--text-sm);">Sign out</a>
      </div>
    </aside>

    <div class="main">
      <header class="main__header">
        <h1 class="main__title" id="main-title">Active deals</h1>
        <div id="main-actions"></div>
      </header>
      <div class="main__content" id="app">
        <p class="empty">Loading…</p>
      </div>
    </div>
  </div>

  <script src="../shared/utils.js"></script>
  <script src="../shared/cognito.js"></script>
  <script src="../shared/router.js"></script>
  <script src="../shared/notifications.js"></script>
  <script src="../shared/api.js"></script>
  <script src="../demo/data.js"></script>
  <script src="../demo/gnma/data.js"></script>
  <script src="../shared/api-demo.js"></script>
  <script src="../shared/state.js"></script>
  <script src="../shared/bidding-deal.js"></script>
  <script src="../shared/vdr-room.js"></script>
  <script src="components.js"></script>

  <script>
  (function () {
    var c = HSG.commercial.components;
    var u = HSG.utils;
    var $app = document.getElementById('app');
    var $title = document.getElementById('main-title');
    var $actions = document.getElementById('main-actions');

    if (!HSG.cognito.isAuthenticated()) {
      window.location.href = 'login.html?next=portal.html';
      return;
    }

    var claims = HSG.api.decodeClaims() || {};
    document.getElementById('user-name').textContent = claims['custom:entityName'] || claims.email || 'Bidder';
    document.getElementById('user-email').textContent = claims.email || '';
    document.getElementById('signout-link').addEventListener('click', function (e) {
      e.preventDefault();
      HSG.cognito.signOut();
      window.location.href = 'login.html';
    });

    HSG.api.notifications.list().then(function (r) {
      var unread = (r.unread || 0);
      if (unread > 0) {
        var el = document.getElementById('notif-count');
        el.textContent = unread;
        el.style.display = 'inline-block';
      }
    }).catch(function () {});

    var bidderId = claims['custom:bidderId'] || null;
    var entries = {}; // saleId → { assetId → raw BID % input }

    HSG.router.on('/', renderSales)
              .on('/sales', renderSales)
              .on('/sale/:saleId', renderSaleDetail)
              .on('/my-bids', renderMyBids)
              .on('/settlements', renderSettlements)
              .on('/settlement/:settlementId', renderSettlementDetail)
              .on('/notifications', renderNotifications)
              .onNotFound(function () { $app.innerHTML = '<p class="empty">Page not found.</p>'; })
              .start();

    function setTitle(title, actions) { $title.textContent = title; $actions.innerHTML = actions || ''; }
    function setLoading() { $app.innerHTML = '<p class="empty">Loading…</p>'; }
    function setError(err) { $app.innerHTML = '<div class="auth-error">' + c.esc(err.message || String(err)) + '</div>'; }
    function setActiveNav() {
      var path = HSG.router.getHash();
      document.querySelectorAll('.sidebar__nav-item').forEach(function (el) {
        var route = el.getAttribute('data-route') || '';
        var match = route === '#' + path || (route !== '#/' && path.indexOf(route.replace('#', '')) === 0);
        el.classList.toggle('active', match);
      });
    }

    function renderSales() {
      setTitle('Active deals');
      setLoading(); setActiveNav();
      // Don't filter by status client-side; backend already scopes to caller's portal.
      // Bidder UI will surface state badges (Qualification Open, Bid Window, etc.) on each card.
      HSG.api.sales.list({}).then(function (r) {
        var sales = (r && r.sales) || [];
        // Hide draft/archived sales from bidders (admin-only states)
        sales = sales.filter(function (s) {
          var st = (s.state || s.status || '').toLowerCase();
          return st !== 'draft' && st !== 'archived';
        });
        if (sales.length === 0) {
          $app.innerHTML = '<div class="empty"><p>No active commercial sales right now.</p><p style="font-size: var(--text-sm); margin-top: var(--space-3);">Check back when the next MHLS or HLS Federal Register Notice publishes.</p></div>';
          return;
        }
        $app.innerHTML = '<div class="sale-grid">' + sales.map(c.renderSaleCard).join('') + '</div>';
        $app.querySelectorAll('[data-route]').forEach(function (el) {
          el.addEventListener('click', function () { HSG.router.navigate(el.getAttribute('data-route').replace('#', '')); });
        });
      }).catch(setError);
    }

    // Cache fetched loans + qc per sale so tab-switches don't re-query
    var ctx = {};

    function renderSaleDetail(params) {
      setLoading(); setActiveNav();
      var saleId = params.saleId;
      Promise.all([
        HSG.api.sales.get(saleId),
        HSG.api.sales.loans(saleId),
        HSG.api.qc.listForSale(saleId).catch(function () { return { findings: [] }; })
      ]).then(function (results) {
        var sale = (results[0] && results[0].sale) || {};
        var loans = (results[1] && results[1].loans) || [];
        var findings = (results[2] && results[2].findings) || [];
        var qcByLoan = {};
        findings.forEach(function (f) { qcByLoan[f.loan_id || f.loanId] = f; });

        var saleId2 = sale.sale_id || sale.saleId || saleId;
        var program = sale.program || sale.programType || 'MHLS';
        var summary = sale.summary || {};
        var pools = sale.pools || [];
        var aggregate = summary.aggregate_upb || sale.aggregateValue || 0;
        var loanCount = summary.loan_count || loans.length;
        var bidDate = (sale.key_dates && sale.key_dates.bid_day) || sale.bidDate;

        ctx[saleId2] = { sale: sale, loans: loans, qcByLoan: qcByLoan, pools: pools };

        setTitle(sale.long_name || sale.sale_name || sale.name || saleId2,
          '<a href="#/sales" class="btn-portal btn-portal--ghost" style="font-size: var(--text-sm);">← All sales</a>');

        var stats = '<div class="stat-grid">' +
          '<div class="stat-card"><div class="stat-card__label">PROGRAM</div><div class="stat-card__value">' + c.esc(program) + '</div></div>' +
          '<div class="stat-card"><div class="stat-card__label">POOLS</div><div class="stat-card__value">' + pools.length + '</div></div>' +
          '<div class="stat-card"><div class="stat-card__label">LOANS</div><div class="stat-card__value">' + c.esc(u.number(loanCount)) + '</div></div>' +
          '<div class="stat-card"><div class="stat-card__label">AGGREGATE UPB</div><div class="stat-card__value" style="font-size: var(--text-lg);">' + c.esc(u.currencyCompact(aggregate)) + '</div></div>' +
          '<div class="stat-card"><div class="stat-card__label">BID DAY</div><div class="stat-card__value" style="font-size: var(--text-lg);">' + c.esc(bidDate ? u.dateShort(bidDate) : '—') + '</div></div>' +
        '</div>';

        var tabs = '<div class="tabs">' +
          '<div class="tabs__item active" data-tab="bidding">Bidding</div>' +
          '<div class="tabs__item" data-tab="loantape">Loan tape</div>' +
          '<div class="tabs__item" data-tab="dataroom">Data room</div>' +
          '<div class="tabs__item" data-tab="qa">Q&amp;A</div>' +
        '</div><div id="tab-content"></div>';

        $app.innerHTML = stats + tabs;
        $app.querySelectorAll('.tabs__item').forEach(function (t) {
          t.addEventListener('click', function () {
            $app.querySelectorAll('.tabs__item').forEach(function (x) { x.classList.remove('active'); });
            t.classList.add('active');
            renderTab(t.getAttribute('data-tab'), sale, ctx[saleId2]);
          });
        });
        renderTab('bidding', sale, ctx[saleId2]);
      }).catch(setError);
    }

    function loansInPool(pool, allLoans) {
      var ids = pool.loan_ids || pool.loanIds || [];
      return (allLoans || []).filter(function (l) { return ids.indexOf(l.loan_id || l.loanId) >= 0; });
    }

    function renderTab(tab, sale, saleCtx) {
      var content = document.getElementById('tab-content');
      var saleId = sale.sale_id || sale.saleId;
      if (tab === 'bidding') {
        var saleEntries = entries[saleId] = entries[saleId] || {};
        var poolsHtml = (saleCtx.pools || []).map(function (p) {
          var pid = p.pool_id || p.poolId;
          var pl = loansInPool(p, saleCtx.loans);
          var raw = saleEntries[pid];
          return c.renderPoolCard(p, pl, raw != null ? { rawPct: raw } : null);
        }).join('');
        content.innerHTML = '<div class="form-grid" style="grid-template-columns: 2fr 1fr; gap: var(--space-6); align-items: flex-start;">' +
          '<div>' + (poolsHtml || '<p class="empty">No assets defined for this sale.</p>') + '<button id="submit-bids" class="btn-portal" style="margin-top: var(--space-4);" disabled>Review &amp; submit bid form</button></div>' +
          '<div id="slip-container">' + c.renderBidSlip(currentSheet(sale, saleCtx), sale) + '</div>' +
        '</div>';
        wirePoolBidInputs(sale, saleCtx);
        updateSlipPanel(sale, saleCtx);
      } else if (tab === 'loantape') {
        renderLoanTape(content, sale, saleCtx);
      } else if (tab === 'dataroom') {
        renderDataRoom(content, sale);
      } else if (tab === 'qa') {
        renderQa(content, sale);
      }
    }

    /** Validate the whole sheet from current raw entries. */
    function currentSheet(sale, saleCtx) {
      var saleId = sale.sale_id || sale.saleId;
      return HSG.bidding.deal.validateSheet(entries[saleId] || {}, saleCtx.pools || []);
    }

    function wirePoolBidInputs(sale, saleCtx) {
      var content = document.getElementById('tab-content');
      var saleId = sale.sale_id || sale.saleId;
      var saleEntries = entries[saleId] = entries[saleId] || {};
      content.querySelectorAll('input[name="bid-pct"]').forEach(function (input) {
        input.addEventListener('input', function () {
          var poolId = input.getAttribute('data-pool-id');
          var pool = (saleCtx.pools || []).find(function (p) { return (p.pool_id || p.poolId) === poolId; });
          var raw = input.value;
          if (raw === '' || raw == null) delete saleEntries[poolId];
          else saleEntries[poolId] = raw;
          // Update the derived BID $ readout (read-only — the bidder never types a dollar amount)
          var entry = HSG.bidding.deal.validateAssetEntry(raw === '' ? undefined : raw, pool);
          var cell = content.querySelector('[data-role="usd-cell"][data-pool-id="' + poolId + '"]');
          if (cell) cell.textContent = entry.state === 'ok' ? u.currency(entry.usd) : '—';
          input.style.borderColor = entry.state === 'error' ? 'var(--color-error)' : '';
          input.title = entry.state === 'error' ? entry.message : '';
          var errEl = content.querySelector('[data-role="pool-error"][data-pool-id="' + poolId + '"]');
          if (errEl) {
            if (entry.state === 'error') {
              errEl.textContent = entry.message;
              errEl.className = 'auth-error';
              errEl.style.cssText = 'margin-top: var(--space-2); font-size: var(--text-sm);';
            } else {
              errEl.textContent = '';
              errEl.style.display = 'none';
            }
          }
          updateSlipPanel(sale, saleCtx);
        });
      });
      var submitBtn = document.getElementById('submit-bids');
      if (submitBtn) submitBtn.addEventListener('click', function () { submitBidForm(sale, saleCtx); });
    }

    function updateSlipPanel(sale, saleCtx) {
      var sheet = currentSheet(sale, saleCtx);
      var slipEl = document.getElementById('slip-container');
      if (slipEl) slipEl.innerHTML = c.renderBidSlip(sheet, sale);
      var btn = document.getElementById('submit-bids');
      if (btn) btn.disabled = !sheet.complete;
    }

    function submitBidForm(sale, saleCtx) {
      var saleId = sale.sale_id || sale.saleId;
      var sheet = currentSheet(sale, saleCtx);
      if (sheet.errors.length) {
        alert('Correct the following before submitting:\n\n' + sheet.errors.map(function (e) { return e.assetId + ': ' + e.message; }).join('\n'));
        return;
      }
      if (sheet.bids.length === 0) return;
      // Bid window enforcement (UI-side; the server enforces authoritatively)
      var saleState = sale.state || sale.status;
      if (saleState && saleState !== 'bid_window' && saleState !== 'Bid Window') {
        alert('Bid window not open. Sale state: ' + saleState);
        return;
      }
      var terms = sale.deposit_terms || sale.depositTerms;
      var s = HSG.bidding.deal.slipTotal(sheet.bids, terms);
      var msg = 'Submit your bid form?\n\nAssets: ' + s.assetCount + '\nTotal (derived): ' + u.currency(s.totalUSD) + '\nDeposit: ' + u.currency(s.depositUSD) + '\n\nYou may revise any percentage until the bid window closes.\n\nType "SUBMIT" to confirm:';
      var resp = prompt(msg);
      if (resp !== 'SUBMIT') return;
      var payload = {
        saleId: saleId,
        bidderId: bidderId,
        assetBids: sheet.bids.map(function (b) { return { assetId: b.assetId, bidPct: b.pct }; })
      };
      HSG.api.bids.submit(payload).then(function (resp2) {
        var receipt = (resp2 && resp2.receipt) || {};
        alert('Bid form received.\n\nReceipt: ' + (receipt.receiptId || '—') +
              '\nForm completion CODE: ' + (receipt.completionCode || '—') +
              '\nTotal (derived): ' + u.currency(receipt.totalUSD || s.totalUSD) +
              '\nDeposit: ' + u.currency(receipt.depositUSD || s.depositUSD) +
              '\n\nYour latest submission supersedes prior ones; you may revise until the window closes.');
        delete entries[saleId];
        renderSaleDetail({ saleId: saleId });
      }).catch(function (err) {
        alert('Submission failed: ' + (err.message || 'Unknown error'));
      });
    }

    function renderLoanTape(container, sale, saleCtx) {
      // Filter pills for asset class + risk flags
      var loans = saleCtx.loans || [];
      var html = '<div style="margin-bottom: var(--space-4); display: flex; gap: var(--space-3); align-items: center; flex-wrap: wrap;">' +
        '<input class="form-input" placeholder="Search loans by FHA #, property, city…" id="loan-search" style="flex: 1; min-width: 240px;" />' +
        '<select class="form-select" id="filter-asset" style="width: auto;">' +
          '<option value="">All asset classes</option>' +
          '<option value="Multifamily">Multifamily</option>' +
          '<option value="Healthcare">Healthcare</option>' +
        '</select>' +
        '<select class="form-select" id="filter-pool" style="width: auto;">' +
          '<option value="">All pools</option>' +
          (saleCtx.pools || []).map(function (p) {
            return '<option value="' + c.esc(p.pool_id || p.poolId) + '">' + c.esc(p.pool_name || p.pool_id) + '</option>';
          }).join('') +
        '</select>' +
      '</div>';
      html += '<div id="loan-tape-body">' + c.renderLoanTape(loans, saleCtx.qcByLoan) + '</div>';
      html += '<div id="loan-detail-drawer" style="display: none;"></div>';
      container.innerHTML = html;

      function applyFilters() {
        var q = (document.getElementById('loan-search').value || '').toLowerCase();
        var ac = document.getElementById('filter-asset').value;
        var pid = document.getElementById('filter-pool').value;
        var pool = pid ? (saleCtx.pools || []).find(function (p) { return (p.pool_id || p.poolId) === pid; }) : null;
        var ids = pool ? (pool.loan_ids || pool.loanIds || []) : null;
        var filtered = loans.filter(function (l) {
          if (ac && l.asset_class !== ac) return false;
          if (ids && ids.indexOf(l.loan_id || l.loanId) < 0) return false;
          if (q) {
            var hay = ((l.fha_case_number || '') + ' ' + (l.property_name || '') + ' ' +
                       ((l.property && l.property.city) || '') + ' ' + ((l.property && l.property.state) || '')).toLowerCase();
            if (hay.indexOf(q) < 0) return false;
          }
          return true;
        });
        document.getElementById('loan-tape-body').innerHTML = c.renderLoanTape(filtered, saleCtx.qcByLoan);
        wireLoanRowClicks();
      }

      function wireLoanRowClicks() {
        document.querySelectorAll('#loan-tape-body tr[data-loan-id]').forEach(function (row) {
          row.addEventListener('click', function () {
            var loanId = row.getAttribute('data-loan-id');
            var loan = loans.find(function (l) { return (l.loan_id || l.loanId) === loanId; });
            var qc = saleCtx.qcByLoan && saleCtx.qcByLoan[loanId];
            var drawer = document.getElementById('loan-detail-drawer');
            drawer.style.display = 'block';
            drawer.innerHTML = '<div style="margin-top: var(--space-6); padding-top: var(--space-6); border-top: 1px solid var(--color-border);">' +
              '<div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-4);">' +
                '<h3 style="font-family: var(--font-heading); font-size: var(--text-2xl);">' + c.esc(loan.property_name || loanId) + '</h3>' +
                '<button class="btn-portal btn-portal--ghost" id="close-loan-detail">Close</button>' +
              '</div>' +
              c.renderLoanDetail(loan, qc) +
            '</div>';
            document.getElementById('close-loan-detail').addEventListener('click', function () {
              drawer.style.display = 'none';
              drawer.innerHTML = '';
            });
            drawer.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        });
      }

      document.getElementById('loan-search').addEventListener('input', u.debounce(applyFilters));
      document.getElementById('filter-asset').addEventListener('change', applyFilters);
      document.getElementById('filter-pool').addEventListener('change', applyFilters);
      wireLoanRowClicks();
    }

    function renderDataRoom(container, sale) {
      HSG.vdrRoom.render(container, sale, { actorEmail: claims.email });
    }

    function renderQa(container, sale) {
      container.innerHTML = '<p class="empty">Loading Q&amp;A…</p>';
      HSG.api.qa.listForSale(sale.saleId).then(function (r) {
        var threads = (r && r.qa) || [];
        var threadsHtml = threads.length
          ? threads.map(function (q) {
              return '<article class="card" style="padding: var(--space-4); margin-bottom: var(--space-3);">' +
                '<div style="font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-muted);">Asked ' + c.esc(u.dateRelative(q.askedAt)) + '</div>' +
                '<p style="margin: var(--space-2) 0; font-weight: 500;">' + c.esc(q.question) + '</p>' +
                (q.answer ? '<div style="padding: var(--space-3); background: var(--color-portal-soft); border-radius: var(--radius-sm); font-size: var(--text-sm);"><strong>Answer:</strong> ' + c.esc(q.answer) + '</div>' : '<div style="font-size: var(--text-sm); color: var(--color-warning); font-style: italic;">Awaiting answer</div>') +
              '</article>';
            }).join('')
          : '<p class="empty" style="padding: var(--space-6);">No questions yet — be the first to ask.</p>';
        container.innerHTML = threadsHtml + '<form id="ask-form" style="margin-top: var(--space-6);"><div class="wizard__field"><label class="wizard__label">Ask a question</label><textarea class="form-textarea" id="ask-text" required></textarea></div><button type="submit" class="btn-portal">Submit</button></form>';
        document.getElementById('ask-form').addEventListener('submit', function (e) {
          e.preventDefault();
          var t = document.getElementById('ask-text').value.trim();
          if (!t) return;
          HSG.api.qa.ask(sale.saleId, { question: t, bidderId: bidderId, bidderName: claims['custom:entityName'] || claims.email })
            .then(function () { renderQa(container, sale); })
            .catch(function (err) { alert(err.message); });
        });
      }).catch(function (err) { container.innerHTML = '<div class="auth-error">' + c.esc(err.message) + '</div>'; });
    }

    function renderMyBids() {
      setTitle('My bids'); setLoading(); setActiveNav();
      HSG.api.bids.list({ bidderId: bidderId }).then(function (r) {
        var bids = (r && r.bids) || [];
        if (bids.length === 0) { $app.innerHTML = '<div class="empty">You have not submitted any bids yet.</div>'; return; }
        var html = '<table class="data-table"><thead><tr><th>Sale</th><th>Asset</th><th style="text-align:right;">BID %</th><th style="text-align:right;">BID $ (derived)</th><th>CODE</th><th>Status</th><th>Submitted</th><th></th></tr></thead><tbody>';
        html += bids.map(function (b) {
          var pct = b.bidPct != null ? b.bidPct : (b.loanBids && b.loanBids.length === 1 ? b.loanBids[0].bidPct : null);
          var agg = b.aggregateUsd != null ? b.aggregateUsd : b.bidAmountUSD;
          var live = !b.withdrawn && (b.status === 'live' || !b.status);
          return '<tr>' +
            '<td>' + c.esc(b.saleId) + '</td>' +
            '<td>' + c.esc(b.poolId || b.assetId || b.dealId) + '</td>' +
            '<td style="text-align:right;">' + c.esc(pct != null ? pct + '%' : '—') + '</td>' +
            '<td style="text-align:right;">' + c.esc(u.currency(agg)) + '</td>' +
            '<td style="font-family: var(--font-mono); font-size: var(--text-xs);">' + c.esc(b.completionCode || '—') + '</td>' +
            '<td><span class="badge">' + c.esc((b.withdrawn ? 'withdrawn' : (b.status || 'live')).toUpperCase()) + '</span></td>' +
            '<td>' + c.esc(u.dateShort(b.submittedAt || b.timestamp)) + '</td>' +
            '<td>' + (live ? '<a href="#" data-action="withdraw" data-bid-id="' + c.esc(b.bidId) + '">Withdraw</a>' : '') + '</td>' +
          '</tr>';
        }).join('');
        html += '</tbody></table>' +
          '<p style="font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-3);">Resubmitting an asset before the window closes supersedes your prior bid on that asset; the latest validated form governs at close.</p>';
        $app.innerHTML = html;
        $app.querySelectorAll('[data-action="withdraw"]').forEach(function (a) {
          a.addEventListener('click', function (e) {
            e.preventDefault();
            var reason = prompt('Reason for withdrawal:');
            if (!reason) return;
            HSG.api.bids.withdraw(a.getAttribute('data-bid-id'), reason).then(renderMyBids).catch(function (err) { alert(err.message); });
          });
        });
      }).catch(setError);
    }

    function renderSettlements() {
      setTitle('My settlements'); setLoading(); setActiveNav();
      HSG.api.settlements.list({ bidderId: bidderId }).then(function (r) {
        var settlements = (r && r.settlements) || [];
        if (settlements.length === 0) { $app.innerHTML = '<div class="empty">No settlements yet.</div>'; return; }
        $app.innerHTML = '<div class="sale-grid">' + settlements.map(function (s) {
          var done = (s.milestones || []).filter(function (m) { return m.status === 'done'; }).length;
          var total = (s.milestones || []).length;
          return '<article class="card" style="padding: var(--space-5); cursor: pointer; border-left: 4px solid var(--color-' + c.esc((s.programType || '').toLowerCase()) + ');" data-route="#/settlement/' + c.esc(s.awardId) + '">' +
            '<div style="font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-muted);">' + c.esc(s.programType) + ' · ' + c.esc(s.saleId) + '</div>' +
            '<h3 style="font-family: var(--font-heading); font-size: var(--text-lg); margin: var(--space-2) 0;">' + c.esc(s.poolOrDealId) + '</h3>' +
            '<div style="font-size: var(--text-sm); color: var(--color-text-muted);">' + c.esc(u.currency(s.awardAmountUSD)) + '</div>' +
            '<div style="margin-top: var(--space-3); font-family: var(--font-mono); font-size: var(--text-xs);">' + done + ' / ' + total + ' milestones</div>' +
            '<div style="height: 6px; background: var(--color-grey-200); border-radius: var(--radius-full); margin-top: var(--space-2);"><div style="height: 100%; width: ' + (total ? (done / total * 100) : 0) + '%; background: var(--color-portal); border-radius: var(--radius-full);"></div></div>' +
          '</article>';
        }).join('') + '</div>';
        $app.querySelectorAll('[data-route]').forEach(function (el) {
          el.addEventListener('click', function () { HSG.router.navigate(el.getAttribute('data-route').replace('#', '')); });
        });
      }).catch(setError);
    }

    function renderSettlementDetail(params) {
      setLoading(); setActiveNav();
      HSG.api.settlements.get(params.settlementId).then(function (r) {
        var s = r.settlement;
        setTitle(s.poolOrDealId + ' · ' + s.saleId, '<a href="#/settlements" class="btn-portal btn-portal--ghost">← All settlements</a>');
        var milestones = (s.milestones || []).map(function (m) {
          var icon = m.status === 'done' ? '✓' : (m.status === 'active' ? '●' : '○');
          var color = m.status === 'done' ? 'var(--color-success)' : (m.status === 'active' ? 'var(--color-portal)' : 'var(--color-grey-400)');
          return '<div style="display: flex; gap: var(--space-3); padding: var(--space-3); border-left: 2px solid ' + color + ';">' +
            '<span style="color: ' + color + '; font-size: var(--text-lg);">' + icon + '</span>' +
            '<div><div style="font-weight: 600;">' + c.esc(m.label) + '</div>' +
            (m.dueOffsetDays != null ? '<div style="font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-muted);">Due day +' + m.dueOffsetDays + '</div>' : '') +
            '</div>' +
          '</div>';
        }).join('');
        var deliverables = (s.deliverables || []).map(function (d) {
          return '<tr><td>' + (d.completed ? '✓' : '○') + '</td><td>' + c.esc(d.label) + '</td><td>' + c.esc(d.category) + '</td><td>' + (d.required ? '<span class="badge">REQ</span>' : '') + '</td></tr>';
        }).join('');
        $app.innerHTML = '<div class="stat-grid">' +
          '<div class="stat-card"><div class="stat-card__label">AWARD</div><div class="stat-card__value">' + c.esc(u.currency(s.awardAmountUSD)) + '</div></div>' +
          '<div class="stat-card"><div class="stat-card__label">SETTLEMENT BY</div><div class="stat-card__value" style="font-size: var(--text-lg);">' + c.esc(u.dateShort(s.expectedSettlementDate)) + '</div></div>' +
          '<div class="stat-card"><div class="stat-card__label">STATUS</div><div class="stat-card__value" style="font-size: var(--text-lg);">' + c.esc(s.status) + '</div></div>' +
        '</div>' +
        '<h3 style="font-family: var(--font-heading); margin: var(--space-6) 0 var(--space-3);">Milestones</h3>' + milestones +
        '<h3 style="font-family: var(--font-heading); margin: var(--space-6) 0 var(--space-3);">Deliverables</h3>' +
        '<table class="data-table"><thead><tr><th></th><th>Item</th><th>Category</th><th></th></tr></thead><tbody>' + deliverables + '</tbody></table>';
      }).catch(setError);
    }

    function renderNotifications() {
      setTitle('Notifications'); setLoading(); setActiveNav();
      HSG.api.notifications.list().then(function (r) {
        var notifs = (r && r.notifications) || [];
        if (notifs.length === 0) { $app.innerHTML = '<div class="empty">No notifications.</div>'; return; }
        $app.innerHTML = notifs.map(function (n) {
          return '<article class="card" style="padding: var(--space-4); margin-bottom: var(--space-2); ' + (n.readAt ? 'opacity: 0.7;' : 'border-left: 3px solid var(--color-portal);') + '">' +
            '<div style="display: flex; justify-content: space-between;">' +
              '<strong>' + c.esc(n.title || n.type) + '</strong>' +
              '<span style="font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-muted);">' + c.esc(u.dateRelative(n.createdAt)) + '</span>' +
            '</div>' +
            '<p style="font-size: var(--text-sm); margin-top: var(--space-1);">' + c.esc(n.message) + '</p>' +
          '</article>';
        }).join('');
      }).catch(setError);
    }
  })();
  </script>
</body>
</html>
