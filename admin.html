<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUD Asset Sales — Admin Console | House Strategies Group</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/design-system.css">
<style>
/* ==========================================================================
   Admin Console — Page-Level Styles
   ========================================================================== */

/* ---- Live pulse animation ------------------------------------------------ */
@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.4); }
}

.live-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  background: var(--color-success);
  border-radius: 50%;
  animation: livePulse 1.5s ease-in-out infinite;
  margin-right: var(--space-2);
  vertical-align: middle;
}

/* ---- Top bar inside main area ------------------------------------------- */
.admin-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  padding: 0 var(--space-6);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  position: sticky;
  top: 0;
  z-index: var(--z-sticky);
}

.admin-topbar__left {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
}

.admin-topbar__left span.breadcrumb-active {
  color: var(--color-text);
  font-weight: 600;
}

.admin-topbar__right {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

.admin-topbar__right select {
  height: 34px;
  padding: 0 var(--space-8) 0 var(--space-3);
  font-size: var(--text-sm);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-surface);
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5l5 5 5-5' stroke='%237F8289' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
}

.notification-bell {
  position: relative;
  font-size: 18px;
  cursor: pointer;
  padding: var(--space-1);
}

.notification-bell__count {
  position: absolute;
  top: -4px;
  right: -6px;
  background: var(--color-error);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ---- Main content area -------------------------------------------------- */
.admin-main {
  padding: var(--space-6);
  padding-bottom: var(--space-16);
}

/* ---- Sale cards grid (dashboard) ---------------------------------------- */
.sale-cards-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-6);
}

.sale-cards-grid .card { cursor: default; }

/* ---- Bid day specific --------------------------------------------------- */
.countdown-banner {
  background: var(--color-primary);
  color: #fff;
  border-radius: var(--radius-lg);
  padding: var(--space-6) var(--space-8);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}

.countdown-banner__time {
  font-family: var(--font-heading);
  font-size: var(--text-4xl);
  font-weight: 700;
  line-height: 1.1;
}

.countdown-banner__label {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.8;
}

.countdown-banner__stats {
  display: flex;
  gap: var(--space-8);
}

.countdown-banner__stat-value {
  font-family: var(--font-heading);
  font-size: var(--text-3xl);
  font-weight: 700;
}

.countdown-banner__stat-label {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.8;
}

.bid-two-col {
  display: grid;
  grid-template-columns: 3fr 2fr;
  gap: var(--space-6);
}

/* ---- AI Chat ------------------------------------------------------------ */
.ai-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: var(--space-6);
  min-height: 600px;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-4) var(--space-6);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  max-height: 500px;
}

.chat-msg {
  display: flex;
  gap: var(--space-3);
  max-width: 85%;
}

.chat-msg--ai { align-self: flex-start; }
.chat-msg--user { align-self: flex-end; flex-direction: row-reverse; }

.chat-msg__avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.chat-msg--ai .chat-msg__avatar {
  background: var(--color-primary-bg);
  color: var(--color-primary);
}

.chat-msg--user .chat-msg__avatar {
  background: var(--color-grey-200);
  color: var(--color-text);
}

.chat-msg__bubble {
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-lg);
  font-size: var(--text-sm);
  line-height: 1.6;
}

.chat-msg--ai .chat-msg__bubble {
  background: var(--color-grey-100);
  color: var(--color-text);
}

.chat-msg--user .chat-msg__bubble {
  background: var(--color-primary);
  color: #fff;
}

.chat-input-bar {
  display: flex;
  gap: var(--space-2);
  padding: var(--space-4) var(--space-6);
  border-top: 1px solid var(--color-border);
}

.chat-input-bar input {
  flex: 1;
  height: 42px;
  padding: 0 var(--space-4);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
}

.chat-input-bar input:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-100);
}

.starter-prompts {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-6) var(--space-4);
}

.starter-prompts button {
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-xs);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  background: var(--color-surface);
  color: var(--color-primary);
  cursor: pointer;
  transition: background var(--duration-fast);
}

.starter-prompts button:hover {
  background: var(--color-primary-bg);
}

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: var(--space-3) var(--space-4);
}

.typing-indicator span {
  width: 8px;
  height: 8px;
  background: var(--color-grey-400);
  border-radius: 50%;
  animation: typingBounce 1.2s ease-in-out infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* ---- Settlement timeline (awards) --------------------------------------- */
.settlement-timeline {
  display: flex;
  gap: var(--space-2);
  align-items: center;
  flex-wrap: wrap;
}

.settlement-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-1);
  text-align: center;
  min-width: 110px;
  font-size: var(--text-xs);
}

.settlement-step__dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border: 2px solid var(--color-border);
  background: var(--color-surface);
}

.settlement-step--done .settlement-step__dot {
  background: var(--color-success);
  border-color: var(--color-success);
  color: #fff;
}

.settlement-step--active .settlement-step__dot {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: #fff;
}

.settlement-step__line {
  flex: 1;
  height: 2px;
  min-width: 30px;
  background: var(--color-border);
  align-self: center;
}

/* ---- Sidebar subtitle --------------------------------------------------- */
.sidebar__brand-sub {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}

/* ---- Misc helpers ------------------------------------------------------- */
.two-col-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); }
.mt-4 { margin-top: var(--space-4); }
.mt-6 { margin-top: var(--space-6); }
.mb-4 { margin-bottom: var(--space-4); }
.mb-6 { margin-bottom: var(--space-6); }

.highlighted-row { background: var(--color-success-bg) !important; }
</style>
</head>

<div class="app-layout">

  <!-- ---- SIDEBAR -------------------------------------------------------- -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div style="width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="font-family:var(--font-heading);font-weight:700;font-size:16px;color:#fff;">HSG</span>
      </div>
      <div>
        <div class="sidebar__brand-name">HUD Asset Sales</div>

<!-- ======================================================================
     ADMIN CONSOLE APPLICATION
     ====================================================================== -->
<script>
(function () {
  'use strict';

  var u  = HSG.utils;
  var c  = HSG.components;
  var D  = window.HSG_DATA;
  var $  = document.getElementById.bind(document);

  // Convenience
  function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function render(html) { $('app-content').innerHTML = html; }
  function setBreadcrumb(text) { $('breadcrumb').textContent = text; }

  // Populate sale selector
  (function initSaleSelector() {
    var sel = $('global-sale-selector');
    D.sales.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.id + ' — ' + s.programType;
      sel.appendChild(opt);
    });
  })();

  // Live bid feed interval handle
  var liveBidInterval = null;
  function clearLiveBid() { if (liveBidInterval) { clearInterval(liveBidInterval); liveBidInterval = null; } }

  // ========================================================================
  // DASHBOARD
  // ========================================================================
  function renderDashboard() {
    clearLiveBid();
    setBreadcrumb('Dashboard');

    var sales = D.sales;
    var totalBidders = sales.reduce(function(s, x) { return s + (x.qualifiedBidders || 0); }, 0);
    var pendingQual = D.bidders.filter(function(b) { return b.qualificationStatus.indexOf('Pending') >= 0; }).length;

    // Find nearest bid date
    var now = new Date();
    var nextBidDays = null;
    sales.forEach(function(s) {
      if (s.bidDate) {
        var d = u.daysUntil(s.bidDate);
        if (d !== null && d >= 0 && (nextBidDays === null || d < nextBidDays)) nextBidDays = d;
      }
    });

    var statHtml = c.renderStatBar([
      { value: sales.length, label: 'Active Sales' },
      { value: totalBidders, label: 'Registered Bidders' },
      { value: pendingQual, label: 'Pending Qualifications' },
      { value: nextBidDays !== null ? nextBidDays : '--', label: 'Days to Next Bid' }
    ]);

    // Alert bar - deadlines within 3 days
    var alertHtml = '';
    var urgentMilestones = [];
    Object.keys(D.timelines).forEach(function(saleId) {
      D.timelines[saleId].forEach(function(m) {
        if (m.date && (m.status === 'active' || m.status === 'upcoming')) {
          var d = u.daysUntil(m.date);
          if (d !== null && d >= 0 && d <= 3) {
            urgentMilestones.push(saleId + ': ' + m.label + ' (' + u.date(m.date) + ')');
          }
        }
      });
    });
    if (urgentMilestones.length) {
      alertHtml = c.renderAlert('warning', 'Upcoming deadlines within 3 days: ' + urgentMilestones.join(' | '));
    }

    // Upcoming deadlines - merge all timelines, sort, next 5
    var allMilestones = [];
    Object.keys(D.timelines).forEach(function(saleId) {
      D.timelines[saleId].forEach(function(m) {
        if (m.date && (m.status === 'active' || m.status === 'upcoming')) {
          allMilestones.push({ date: m.date, label: saleId + ' — ' + m.label, status: m.status, description: m.description });
        }
      });
    });
    allMilestones.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
    var next5 = allMilestones.slice(0, 5);
    var timelineHtml = c.renderTimeline(next5);

    // Sale cards
    var cardsHtml = sales.map(function(sale) {
      var timeline = D.timelines[sale.id] || [];
      var total = timeline.length;
      var completed = timeline.filter(function(m) { return m.status === 'completed'; }).length;
      var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
      var nextMilestone = timeline.filter(function(m) { return m.status === 'active' || m.status === 'upcoming'; })[0];

      var pi = u.programInfo[sale.programType] || {};
      return (
        '<div class="card">' +
          '<div class="card-header">' +
            '<div class="card-header__title">' + c.renderBadge(sale.programType) + ' ' + esc(sale.name) + '</div>' +
            '<div class="card-header__actions">' + c.renderBadge(sale.status.indexOf('Active') >= 0 ? 'active' : (sale.status.indexOf('Postponed') >= 0 ? 'warning' : 'info'), sale.status) + '</div>' +
          '</div>' +
          '<div class="card-body">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-3);">' +
              '<span class="text-sm text-muted">Progress</span>' +
              '<span class="mono-label">' + pct + '%</span>' +
            '</div>' +
            '<div class="progress mb-4"><div class="progress-fill" style="width:' + pct + '%;"></div></div>' +
            (nextMilestone ? '<div class="text-sm mb-4"><strong>Next:</strong> ' + esc(nextMilestone.label) + (nextMilestone.date ? ' — ' + u.date(nextMilestone.date) : ' — TBD') + '</div>' : '') +
            '<div style="display:flex;gap:var(--space-6);font-size:var(--text-sm);color:var(--color-text-muted);">' +
              '<span>' + u.number(sale.loanCount) + ' loans</span>' +
              '<span>' + u.currencyCompact(sale.aggregateValue) + '</span>' +
              '<span>' + (sale.qualifiedBidders || 0) + ' bidders</span>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    }).join('');

    render(
      '<div class="page-header">' +
        '<h2 class="page-header__title">Dashboard</h2>' +
        '<p class="page-header__subtitle">Welcome back, Transaction Specialist</p>' +
      '</div>' +
      statHtml +
      (alertHtml ? '<div class="mt-6">' + alertHtml + '</div>' : '') +
      '<div class="mt-6"><h4>Upcoming Deadlines</h4><div class="mt-4">' + timelineHtml + '</div></div>' +
      '<div class="mt-6"><h4>Active Sales</h4><div class="sale-cards-grid mt-4">' + cardsHtml + '</div></div>'
    );
  }

  // ========================================================================
  // BIDDER QUALIFICATION PIPELINE
  // ========================================================================
  function renderBidders() {
    clearLiveBid();
    setBreadcrumb('Bidder Qualification Pipeline');

    var bidders = D.bidders;
    var qualified = bidders.filter(function(b) { return b.qualificationStatus.indexOf('Qualified') >= 0; });
    var pending = bidders.filter(function(b) { return b.qualificationStatus.indexOf('Pending') >= 0; });
    var ogc = bidders.filter(function(b) { return b.qualificationStatus.indexOf('OGC') >= 0; });

    var statHtml = c.renderStatBar([
      { value: bidders.length, label: 'Total Applications' },
      { value: qualified.length, label: 'Qualified' },
      { value: pending.length, label: 'Pending Review' },
      { value: ogc.length, label: 'OGC Referrals' }
    ]);

    var tabsHtml = c.renderTabs([
      { id: 'all', label: 'All', count: bidders.length },
      { id: 'qualified', label: 'Qualified', count: qualified.length },
      { id: 'pending', label: 'Pending', count: pending.length },
      { id: 'ogc', label: 'OGC Review', count: ogc.length },
      { id: 'rejected', label: 'Rejected', count: 0 }
    ], 'all');

    function buildTable(list) {
      return c.renderDataTable({
        id: 'bidder-table',
        columns: [
          { key: 'entityName', label: 'Bidder Name', sortable: true },
          { key: 'entityType', label: 'Entity Type', sortable: true },
          { key: 'qualificationStatus', label: 'Status', format: function(v) { var k = v.indexOf('Qualified') >= 0 ? 'approved' : (v.indexOf('Pending') >= 0 ? 'pending' : 'info'); return c.renderBadge(k, v); } },
          { key: 'submittedDate', label: 'Submitted', format: 'date', sortable: true },
          { key: 'ofacSam', label: 'OFAC/SAM', format: function(v, row) { return ''; } },
          { key: 'priorSales', label: 'Prior Sales', sortable: true },
          { key: 'programTypes', label: 'Programs', format: function(v) { return Array.isArray(v) ? v.map(function(p) { return c.renderBadge(p); }).join(' ') : esc(String(v)); } },
          { key: 'actions', label: 'Actions', format: function(v) { return ''; } }
        ],
        data: list.map(function(b) {
          return {
            entityName: b.entityName,
            entityType: b.entityType,
            qualificationStatus: b.qualificationStatus,
            submittedDate: b.submittedDate,
            ofacSam: b.ofacStatus,
            priorSales: b.priorSales,
            programTypes: b.programTypes,
            actions: b.bidderId
          };
        }),
        emptyMessage: 'No bidders match this filter.'
      });
    }

    var tableHtml = buildTable(bidders);

    render(
      '<div class="page-header">' +
        '<h2 class="page-header__title">Bidder Qualification Pipeline</h2>' +
      '</div>' +
      statHtml +
      '<div class="mt-6" id="bidder-tabs-container">' + tabsHtml + '</div>' +
      '<div class="mt-4" id="bidder-table-area">' + tableHtml + '</div>'
    );

    // Fix OFAC/SAM and Action columns via DOM manipulation after render
    fixBidderTable(bidders);

    // Tab filtering
    c.initTabs('bidder-tabs-container', function(tabId) {
      var filtered;
      switch (tabId) {
        case 'qualified': filtered = qualified; break;
        case 'pending': filtered = pending; break;
        case 'ogc': filtered = ogc; break;
        case 'rejected': filtered = []; break;
        default: filtered = bidders;
      }
      $('bidder-table-area').innerHTML = buildTable(filtered);
      fixBidderTable(filtered);
      c.initTableSort();
    });

    c.initTableSort();
  }

      }
    });
  }

  // ========================================================================
  // BID DAY OPERATIONS
  // ========================================================================
  function renderBidDay() {
    clearLiveBid();
    setBreadcrumb('Bid Day Operations');

    var saleId = $('global-sale-selector').value || 'HVLS-2026-2';
    var sale = D.sales.filter(function(s) { return s.id === saleId; })[0] || D.sales[0];
    var allBids = (D.bids.hvls || []).concat(D.bids.mhls || []);
    var saleBids = allBids.filter(function(b) { return b.saleId === sale.id; });

    // Sort by time desc
    saleBids.sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });

    var conforming = saleBids.filter(function(b) { return b.conformingStatus === 'Conforming'; });
    var nonConforming = saleBids.filter(function(b) { return b.conformingStatus !== 'Conforming'; });

    // Countdown: simulate 2h 14m remaining
    var hoursLeft = 2, minsLeft = 14;

    var countdownHtml =
      '<div class="countdown-banner">' +
        '<div>' +
          '<div class="countdown-banner__label"><span class="live-dot"></span> BID WINDOW OPEN</div>' +
          '<div class="countdown-banner__time" id="countdown-time">' + hoursLeft + 'h ' + minsLeft + 'm remaining</div>' +
          '<div class="progress mt-4" style="height:6px;background:rgba(255,255,255,0.2);max-width:300px;"><div class="progress-fill" style="width:72%;background:#fff;"></div></div>' +
        '</div>' +
        '<div class="countdown-banner__stats">' +
          '<div><div class="countdown-banner__stat-value" id="bid-total-count">' + saleBids.length + '</div><div class="countdown-banner__stat-label">Total Bids</div></div>' +
          '<div><div class="countdown-banner__stat-value">' + conforming.length + '</div><div class="countdown-banner__stat-label">Conforming</div></div>' +
          '<div><div class="countdown-banner__stat-value">' + nonConforming.length + '</div><div class="countdown-banner__stat-label">Non-Conforming</div></div>' +
        '</div>' +
      '</div>';

    // Bid feed table
    var feedRows = saleBids.map(function(b) {
      var t = new Date(b.timestamp);
      var timeStr = t.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      var statusBadge = b.conformingStatus === 'Conforming'
        ? c.renderBadge('approved', 'Conforming')
        : c.renderBadge('rejected', 'Non-Conforming');
      return '<tr' + (b.conformingStatus !== 'Conforming' ? ' style="background:var(--color-error-bg);"' : '') + '>' +
        '<td>' + timeStr + '</td>' +
        '<td>' + esc(b.bidderName) + '</td>' +
        '<td>' + esc(b.poolLabel || b.poolId) + '</td>' +
        '<td class="cell-number">' + b.bidAmount + (b.bidAmountUnit === '% of BPO' ? '%' : '') + '</td>' +
        '<td class="cell-number">' + u.currency(b.impliedDollarAmount || b.bidAmount) + '</td>' +
        '<td>' + statusBadge + '</td>' +
      '</tr>';
    }).join('');

    var feedTableHtml =
      '<div class="card">' +
        '<div class="card-header"><div class="card-header__title"><span class="live-dot"></span> Live Bid Feed</div></div>' +
        '<div style="max-height:400px;overflow-y:auto;">' +
          '<table class="data-table data-table--compact" id="bid-feed-table">' +
            '<thead><tr><th>Time</th><th>Bidder</th><th>Pool</th><th>Bid</th><th>Implied Value</th><th>Status</th></tr></thead>' +
            '<tbody id="bid-feed-body">' + feedRows + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>';

    // Issues log
    var issuesHtml = nonConforming.length > 0
      ? nonConforming.map(function(b) {
          return '<div style="padding:var(--space-3) 0;border-bottom:1px solid var(--color-border);font-size:var(--text-sm);">' +
            '<div style="font-weight:600;">' + esc(b.bidderName) + ' — ' + esc(b.poolLabel || b.poolId) + '</div>' +
            '<div class="text-muted mt-4" style="margin-top:var(--space-1);">' + esc(b.nonConformingReason) + '</div>' +
            '<button class="btn btn--sm btn--outline mt-4" style="margin-top:var(--space-2);">Resolve</button>' +
          '</div>';
        }).join('')
      : '<p class="text-sm text-muted" style="padding:var(--space-4);">No issues flagged.</p>';

    // Pool summary
    var pools = sale.pools || [];
    var poolSummaryRows = pools.map(function(pool) {
      var poolBids = saleBids.filter(function(b) { return b.poolId === pool.poolId; });
      var conformingBids = poolBids.filter(function(b) { return b.conformingStatus === 'Conforming'; });
      var highest = conformingBids.reduce(function(mx, b) { return b.bidAmount > mx ? b.bidAmount : mx; }, 0);
      var avg = conformingBids.length > 0 ? (conformingBids.reduce(function(s, b) { return s + b.bidAmount; }, 0) / conformingBids.length) : 0;
      var reserveMet = highest >= 55; // simplified reserve check
      return '<tr>' +
        '<td>' + esc(pool.label) + '</td>' +
        '<td class="cell-number">' + poolBids.length + '</td>' +
        '<td class="cell-number">' + (highest > 0 ? highest.toFixed(1) + '%' : '--') + '</td>' +
        '<td class="cell-number">' + (avg > 0 ? avg.toFixed(1) + '%' : '--') + '</td>' +
        '<td>' + (reserveMet && conformingBids.length > 0 ? '<span style="color:var(--color-success);">&#10003; Yes</span>' : '<span style="color:var(--color-error);">&#10007; No</span>') + '</td>' +
      '</tr>';
    }).join('');

    // 30-minute summary
    var summaryText = saleBids.length + ' bids received across ' + pools.length + ' pools. ';
    var topPool = pools.reduce(function(best, pool) {
      var poolConf = saleBids.filter(function(b) { return b.poolId === pool.poolId && b.conformingStatus === 'Conforming'; });
      var highest = poolConf.reduce(function(mx, b) { return b.bidAmount > mx ? b.bidAmount : mx; }, 0);
      return highest > (best.val || 0) ? { label: pool.label, val: highest } : best;
    }, {});
    if (topPool.label) summaryText += topPool.label + ' leading at ' + topPool.val.toFixed(1) + '% of BPO. ';
    summaryText += nonConforming.length + ' non-conforming bid' + (nonConforming.length !== 1 ? 's' : '') + ' flagged.';

    var rightCol =
      '<div class="card mb-6"><div class="card-header"><div class="card-header__title">Issues Log</div><div class="card-header__actions">' + c.renderBadge('rejected', nonConforming.length + ' issues') + '</div></div><div class="card-body" style="max-height:200px;overflow-y:auto;">' + issuesHtml + '</div></div>' +
      '<div class="card mb-6"><div class="card-header"><div class="card-header__title">Pool Summary</div></div><div class="card-body" style="padding:0;"><table class="data-table data-table--compact"><thead><tr><th>Pool</th><th>Bids</th><th>Highest</th><th>Average</th><th>Reserve</th></tr></thead><tbody>' + poolSummaryRows + '</tbody></table></div></div>' +
      '<div class="card"><div class="card-header"><div class="card-header__title">30-Minute Summary</div></div><div class="card-body"><p class="text-body-sm">' + esc(summaryText) + '</p></div></div>';

    render(
      '<div class="page-header">' +
        '<h2 class="page-header__title">Bid Day Operations</h2>' +
        '<p class="page-header__subtitle">' + esc(sale.name) + '</p>' +
      '</div>' +
      countdownHtml +
      '<div class="bid-two-col">' +
        '<div>' + feedTableHtml + '</div>' +
        '<div>' + rightCol + '</div>' +
      '</div>'
    );

    // Start live bid simulation
    startLiveBidFeed(sale);
  }

  function startLiveBidFeed(sale) {
    var bidderNames = ['Lone Star Capital Partners LLC', 'Atlantic Residential Mortgage Trust', 'Pinnacle Asset Recovery Group', 'National Community Stabilization Trust', 'Cook County Land Bank Authority', 'Meridian Housing Solutions Inc'];
    var pools = sale.pools || [];
    if (!pools.length) return;

    var bidCount = document.querySelectorAll('#bid-feed-body tr').length;

    liveBidInterval = setInterval(function() {
      var tbody = document.getElementById('bid-feed-body');
      var countEl = document.getElementById('bid-total-count');
      if (!tbody) { clearLiveBid(); return; }

      var pool = pools[Math.floor(Math.random() * pools.length)];
      var bidder = bidderNames[Math.floor(Math.random() * bidderNames.length)];
      var pct = (55 + Math.random() * 20).toFixed(1);
      var bpo = pool.aggregateBPO || pool.aggregateUPB || pool.aggregateETD || pool.upb || 10000000;
      var implied = Math.round(bpo * (parseFloat(pct) / 100));
      var now = new Date();
      var timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      var isConforming = Math.random() > 0.15;
      var statusBadge = isConforming
        ? '<span class="badge badge--approved">Conforming</span>'
        : '<span class="badge badge--rejected">Non-Conforming</span>';

      var row = document.createElement('tr');
      if (!isConforming) row.style.background = 'var(--color-error-bg)';
      row.style.animation = 'fadeIn 0.5s ease';
      row.innerHTML =
        '<td>' + timeStr + '</td>' +
        '<td>' + esc(bidder) + '</td>' +
        '<td>' + esc(pool.label) + '</td>' +
        '<td class="cell-number">' + pct + '%</td>' +
        '<td class="cell-number">' + u.currency(implied) + '</td>' +
        '<td>' + statusBadge + '</td>';

      tbody.insertBefore(row, tbody.firstChild);
      bidCount++;
      if (countEl) countEl.textContent = bidCount;
    }, 15000);
  }

            '<button class="btn btn--primary">Approve</button>' +

      { label: 'Deposit Received', status: 'active' },
      { label: 'CAA Execution', status: 'upcoming' },
      { label: 'Settlement Date', status: 'upcoming' }

    var settlementHtml = '<div class="card">' +
      '<div class="card-header"><div class="card-header__title">Settlement Tracker</div></div>' +

        '<div class="settlement-timeline">';

  // AI chat scripted responses
  var aiResponses = {
    portfolio: 'HVLS 2026-2 Portfolio Analysis:\n\n' +
      '- Total Loans: 203 across 4 pools\n' +
      '- Aggregate BPO: $55.4M\n' +
      '- Geographic Distribution: Southeast (31%), Northeast (27%), National (29%), Metro Targeted (13%)\n' +
      '- Average BPO per Loan: $273,000\n' +
      '- Median BPO: $248,500\n' +
      '- BPO Range: $85,000 - $625,000\n' +
      '- All properties confirmed vacant\n' +
      '- Average time since vacancy confirmation: 8.2 months\n' +
      '- 14 qualified bidders, including 2 nonprofit mission pool-eligible entities',

    anomaly: 'Bid Anomaly Detection Results:\n\n' +
      '1. BID-HVLS-2026-2-006 (Pinnacle Asset Recovery - Pool B): Non-conforming. Bid deposit wire received 4 minutes past the 10:00 AM ET deadline. Procedural violation per BIP Section 4.2(a).\n\n' +
      '2. BID-HVLS-2026-2-012 (Atlantic Residential - Pool D): Non-conforming. Unauthorized modification to servicing transfer timeline in Exhibit B. Deviates from standard 60-day requirement per BIP Section 6.1(c).\n\n' +
      '3. Statistical Outlier: Pool D bid spread (60.2% - 70.8%) is wider than expected based on historical HVLS sale patterns. May warrant additional review of Pool D valuation inputs.',

    bidder: 'Bidder Qualification Pipeline Summary:\n\n' +
      '- Total Applications: 8\n' +
      '- Qualified: 5 (63%)\n' +
      '- Pending Review: 3\n'  +
      '  - Meridian Housing Solutions: Financial review in progress\n' +
      '  - Heartland Housing Preservation: OGC nonprofit verification\n' +
      '  - Cascade-Pacific Housing Partners JV: OGC JV structure review\n' +
      '- Entity Type Mix: 2 Institutional, 2 For-Profit, 2 Nonprofit, 1 Government, 1 JV\n' +
      '- Average Prior Sales (qualified): 6.2\n' +
      '- Mission Pool Eligible: 3 entities',

    pool: 'Pool Statistics for HVLS 2026-2:\n\n' +
      'Pool A (Southeast): 62 loans, $16.85M BPO, 3 bids, Highest: 72.5%\n' +
      'Pool B (Northeast): 55 loans, $17.23M BPO, 3 bids, Highest: 75.4%\n' +
      'Pool C (National): 58 loans, $14.89M BPO, 3 bids, Highest: 78.1%\n' +
      'Pool D (Metro Targeted): 28 loans, $6.45M BPO, 3 bids, Highest: 70.8%\n\n' +
      'Weighted Average Highest Bid: 74.2% of BPO\n' +
      'Total Implied Proceeds (highest bids): $41.1M',

    default: 'I can help with portfolio analysis, bid anomaly detection, bidder qualification summaries, and pool statistics. Try asking about one of these topics.'
  };

  window.adminSendAIMessage = function(text) {
    var input = document.getElementById('chat-input');
    var msg = text || (input ? input.value.trim() : '');
    if (!msg) return;
    if (input) input.value = '';

    // Hide starter prompts
    var sp = document.getElementById('starter-prompts');
    if (sp) sp.style.display = 'none';

    // Add user message
    var messages = document.getElementById('chat-messages');
    if (!messages) return;

    var userDiv = document.createElement('div');
    userDiv.className = 'chat-msg chat-msg--user';
    userDiv.innerHTML = '<div class="chat-msg__avatar">TS</div><div class="chat-msg__bubble">' + esc(msg) + '</div>';
    messages.appendChild(userDiv);
    messages.scrollTop = messages.scrollHeight;

    // Show typing indicator
    var typingDiv = document.createElement('div');
    typingDiv.className = 'chat-msg chat-msg--ai';
    typingDiv.id = 'typing-indicator';
    typingDiv.innerHTML = '<div class="chat-msg__avatar">AI</div><div class="typing-indicator"><span></span><span></span><span></span></div>';
    messages.appendChild(typingDiv);
    messages.scrollTop = messages.scrollHeight;

    // Determine response
    var lower = msg.toLowerCase();
    var responseText = aiResponses.default;
    if (lower.indexOf('portfolio') >= 0 || lower.indexOf('analyze') >= 0 || lower.indexOf('analysis') >= 0) {
      responseText = aiResponses.portfolio;
    } else if (lower.indexOf('anomal') >= 0 || lower.indexOf('flag') >= 0) {
      responseText = aiResponses.anomaly;
    } else if (lower.indexOf('bidder') >= 0 || lower.indexOf('qualification') >= 0) {
      responseText = aiResponses.bidder;
    } else if (lower.indexOf('pool') >= 0 || lower.indexOf('statistic') >= 0) {
      responseText = aiResponses.pool;
    }

    // Delay then show response
    setTimeout(function() {
      var ti = document.getElementById('typing-indicator');
      if (ti) ti.remove();

      var aiDiv = document.createElement('div');
      aiDiv.className = 'chat-msg chat-msg--ai';
      aiDiv.innerHTML = '<div class="chat-msg__avatar">AI</div><div class="chat-msg__bubble" style="white-space:pre-wrap;">' + esc(responseText) + '</div>';
      messages.appendChild(aiDiv);
      messages.scrollTop = messages.scrollHeight;
    }, 1500);
  };

  // ========================================================================
  // ROUTER SETUP
  // ========================================================================
  HSG.router
    .on('/dashboard', renderDashboard)
    .on('/bidders', renderBidders)
    .on('/bid-day', renderBidDay)
    .on('/awards', renderAwards)
    .on('/compliance', renderCompliance)
    .on('/ai-assistant', renderAIAssistant)
    .onNotFound(function() { HSG.router.navigate('/dashboard'); });

  // Default route
  if (!window.location.hash || window.location.hash === '#' || window.location.hash === '#/') {
    window.location.hash = '#/dashboard';
  }

  HSG.router.start();

})();
</script>
