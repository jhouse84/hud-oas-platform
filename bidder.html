          '<div class="bid-slip-divider"></div>' +
          '<div class="bid-slip-totals" id="bidSlipTotals">' +
            '<div class="bid-slip-total-row primary"><span class="label">Total Bid Amount</span><span class="value" id="bidSlipTotal">&mdash;</span></div>' +
            '<div class="bid-slip-total-row"><span class="label">Required Deposit (10%)</span><span class="value" id="bidSlipDeposit">&mdash;</span></div>' +
          '</div>' +
          '<div id="bidSlipNoBids"></div>' +
          '<div class="bid-slip-ack">' +
            '<label><input type="checkbox" id="bidAckCheckbox"> I confirm these bids are binding per the executed Confidentiality and Access Agreement (CAA).</label>' +
          '</div>' +
          '<button class="bid-slip-submit" id="bidSubmitBtn" disabled onclick="openReview()">Review &amp; Submit All Bids</button>' +
        '</div>';

        html += '</div></div>'; // end workspace + container

        $('#app').innerHTML = html;
        initBidPage(sale);
      });
    }

    function initBidPage(sale) {
      // Sandbox toggle
      var toggle = $('#sandboxToggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          sandboxMode = !sandboxMode;
          toggle.classList.toggle('on', sandboxMode);
          document.body.classList.toggle('sandbox-active', sandboxMode);
        });
      }

      // Countdown timer
      startCountdown(sale.bidDate);

      // Checkbox enabling submit
      var ack = $('#bidAckCheckbox');
      if (ack) {
        ack.addEventListener('change', updateSubmitButton);
      }

      // Expand first pool
      var firstPool = sale.pools[0];
      if (firstPool) {
        var id = firstPool.poolId || firstPool.dealId;
        if (id) togglePool(id);
      }

      updateBidSlip(sale);
    }

    var countdownInterval = null;
    function startCountdown(dateStr) {
      if (countdownInterval) clearInterval(countdownInterval);
      var el = $('#bidCountdown');
      if (!el || !dateStr) { if (el) el.textContent = 'TBD'; return; }
      function update() {
        var cd = formatCountdown(dateStr);
        el.textContent = cd.text;
        el.className = 'bid-countdown countdown ' + cd.cls;
      }
      update();
      countdownInterval = setInterval(update, 1000);
    }

    window.togglePool = function(poolId) {
      var card = $('#pool-' + poolId);
      if (card) card.classList.toggle('expanded');
    };

    window.onBidInput = function(input) {
      var poolId = input.getAttribute('data-pool');
      var agg = parseFloat(input.getAttribute('data-agg')) || 0;
      var label = input.getAttribute('data-label') || 'BPO';
      var raw = input.value.replace(/[^0-9.]/g, '');
      var pct = parseFloat(raw);

      var pctDisplay = document.querySelector('.bid-pct-display[data-pool="' + poolId + '"]');
      var impliedDisplay = document.querySelector('.bid-implied-display[data-pool="' + poolId + '"]');
      var depositDisplay = document.querySelector('.bid-deposit-display[data-pool="' + poolId + '"]');
      var warning = $('#warning-' + poolId);

      if (isNaN(pct) || pct <= 0) {
        if (pctDisplay) pctDisplay.textContent = '\u2014';
        if (impliedDisplay) impliedDisplay.textContent = '\u2014';
        if (depositDisplay) depositDisplay.textContent = '\u2014';
        if (warning) warning.classList.remove('visible');
        delete currentBids[poolId];
      } else {
        // Validate range
        if (pct > 200) { input.value = '200'; pct = 200; }
        var implied = agg * (pct / 100);
        var deposit = implied * 0.1;
        if (pctDisplay) pctDisplay.textContent = pct.toFixed(2) + '%';
        if (impliedDisplay) impliedDisplay.textContent = u.currency(implied);
        if (depositDisplay) depositDisplay.textContent = u.currency(deposit);
        if (warning) {
          warning.classList.toggle('visible', pct < 30 || pct > 90);
        }
        currentBids[poolId] = { amount: pct, unit: '% of ' + label, impliedValue: implied };
      }

      updateBidSlip(getSaleFromCurrentRoute());
    };

    window.onDealBidInput = function(input) {
      var poolId = input.getAttribute('data-pool');
      var units = parseInt(input.getAttribute('data-units')) || 1;
      var noi = parseFloat(input.getAttribute('data-noi')) || 0;

      // Format with commas as user types
      var raw = input.value.replace(/[^0-9]/g, '');
      var num = parseInt(raw) || 0;
      if (raw) input.value = num.toLocaleString('en-US');

      var perUnitEl = document.querySelector('.deal-per-unit[data-pool="' + poolId + '"]');
      var capRateEl = document.querySelector('.deal-cap-rate[data-pool="' + poolId + '"]');

      if (num > 0) {
        var perUnit = num / units;
        var capRate = noi > 0 ? ((noi / num) * 100).toFixed(1) : '\u2014';
        if (perUnitEl) perUnitEl.textContent = u.currency(perUnit) + ' per unit';
        if (capRateEl) capRateEl.textContent = capRate + '% implied cap rate';
        currentBids[poolId] = { amount: num, unit: '$', impliedValue: num };
      } else {
        if (perUnitEl) perUnitEl.textContent = '$0 per unit';
        if (capRateEl) capRateEl.textContent = '\u2014 implied cap rate';
        delete currentBids[poolId];
      }

      updateBidSlip(getSaleFromCurrentRoute());
    };

    function getSaleFromCurrentRoute() {
      var hash = HSG.router.getHash();
      var parts = hash.split('/');
      var saleId = parts[parts.length - 1];
      return getSale(saleId);
    }

    function updateBidSlip(sale) {
      if (!sale) return;
      var itemsEl = $('#bidSlipItems');
      var countEl = $('#bidSlipCount');
      var totalEl = $('#bidSlipTotal');
      var depositEl = $('#bidSlipDeposit');
      var noBidsEl = $('#bidSlipNoBids');
      if (!itemsEl) return;

      var bidCount = Object.keys(currentBids).length;
      var totalImplied = 0;
      var itemsHtml = '';
      var noBidsHtml = '';

      var pools = sale.pools;
      if (sale.programType === 'MHLS') {
        pools = (DATA.loansMHLS || []).map(function(d) {
          return { poolId: d.dealId, label: d.propertyName };
        });
      }

      pools.forEach(function(pool) {
        var id = pool.poolId || pool.dealId;
        var bid = currentBids[id];
        if (bid) {
          totalImplied += bid.impliedValue || 0;
          var displayAmount = bid.unit === '$' ? u.currency(bid.amount) : bid.amount.toFixed(2) + '%';
          itemsHtml += '<div class="bid-slip-item">' +
            '<span class="bid-slip-item-name">' + esc(pool.label) + '</span>' +
            '<span class="bid-slip-item-amount">' + displayAmount + '</span>' +
            '<span class="bid-slip-item-implied">' + u.currencyCompact(bid.impliedValue) + '</span>' +
            '<button class="bid-slip-remove" onclick="removeBid(\'' + esc(id) + '\')">&times;</button>' +
          '</div>';
        } else {
          noBidsHtml += '<div class="bid-slip-no-bid">' + esc(pool.label) + ': No bid entered</div>';
        }
      });

      itemsEl.innerHTML = itemsHtml;
      if (countEl) countEl.textContent = bidCount + ' bid' + (bidCount !== 1 ? 's' : '');
      if (totalEl) totalEl.textContent = totalImplied > 0 ? u.currency(totalImplied) : '\u2014';
      if (depositEl) depositEl.textContent = totalImplied > 0 ? u.currency(totalImplied * 0.1) : '\u2014';
      if (noBidsEl) noBidsEl.innerHTML = noBidsHtml;

      updateSubmitButton();
    }

    window.removeBid = function(poolId) {
      delete currentBids[poolId];
      var input = document.querySelector('.bid-input-field[data-pool="' + poolId + '"]');
      if (input) {
        input.value = '';
        var pctDisplay = document.querySelector('.bid-pct-display[data-pool="' + poolId + '"]');
        var impliedDisplay = document.querySelector('.bid-implied-display[data-pool="' + poolId + '"]');
        var depositDisplay = document.querySelector('.bid-deposit-display[data-pool="' + poolId + '"]');
        if (pctDisplay) pctDisplay.textContent = '\u2014';
        if (impliedDisplay) impliedDisplay.textContent = '\u2014';
        if (depositDisplay) depositDisplay.textContent = '\u2014';
        var perUnitEl = document.querySelector('.deal-per-unit[data-pool="' + poolId + '"]');
        var capRateEl = document.querySelector('.deal-cap-rate[data-pool="' + poolId + '"]');
        if (perUnitEl) perUnitEl.textContent = '$0 per unit';
        if (capRateEl) capRateEl.textContent = '\u2014 implied cap rate';
      }
      var warning = $('#warning-' + poolId);
      if (warning) warning.classList.remove('visible');
      updateBidSlip(getSaleFromCurrentRoute());
    };

    function updateSubmitButton() {
      var btn = $('#bidSubmitBtn');
      var ack = $('#bidAckCheckbox');
      if (!btn) return;
      var hasBids = Object.keys(currentBids).length > 0;
      var isAcked = ack && ack.checked;
      btn.disabled = !(hasBids && isAcked);
    }

    // --- Review & Submit ---
    window.openReview = function() {
      var sale = getSaleFromCurrentRoute();
      if (!sale) return;
      var overlay = $('#reviewOverlay');
      var content = $('#reviewContent');
      var progress = $('#submissionProgress');
      var success = $('#submissionSuccess');
      progress.classList.remove('active');
      success.classList.remove('active');

      var totalImplied = 0;
      var bidsHtml = '';
      var pools = sale.pools;
      if (sale.programType === 'MHLS') {
        pools = (DATA.loansMHLS || []).map(function(d) { return { poolId: d.dealId, label: d.propertyName }; });
      }

      pools.forEach(function(pool) {
        var id = pool.poolId || pool.dealId;
        var bid = currentBids[id];
        if (bid) {
          totalImplied += bid.impliedValue || 0;
          var displayAmount = bid.unit === '$' ? u.currency(bid.amount) : bid.amount.toFixed(2) + '%';
          bidsHtml += '<div class="review-bid-item"><span class="pool-name">' + esc(pool.label) + '</span>' +
            '<span><span class="bid-val">' + displayAmount + '</span><span class="implied-val">' + u.currency(bid.impliedValue) + '</span></span></div>';
        } else {
          bidsHtml += '<div class="review-bid-item no-bid"><span>' + esc(pool.label) + '</span><span>No bid</span></div>';
        }
      });

      var now = new Date();
      var timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }) + ' ET';
      var expectedTotal = u.currency(totalImplied);

      content.innerHTML = '<div class="review-header"><h3>FINAL BID REVIEW</h3></div>' +
        '<div class="review-body">' + bidsHtml +
          '<div class="review-total-section">' +
            '<div class="review-total-row primary"><span>Total Bid Amount</span><span>' + expectedTotal + '</span></div>' +
            '<div class="review-total-row"><span>Required Deposit (10%)</span><span>' + u.currency(totalImplied * 0.1) + '</span></div>' +
          '</div>' +
          '<div class="review-timestamp">Review generated at ' + timeStr + '</div>' +
          '<div class="review-ack"><label><input type="checkbox" id="reviewAckCheckbox"> I confirm these bids are binding and I have authority to submit on behalf of my entity per the executed CAA.</label></div>' +
          '<div class="type-confirm-wrap" id="typeConfirmWrap">' +
            '<div class="type-confirm-label">Type the total bid amount to confirm: <strong>' + expectedTotal + '</strong></div>' +
            '<input class="type-confirm-input" id="typeConfirmInput" type="text" placeholder="' + expectedTotal + '">' +
          '</div>' +
        '</div>' +
        '<div class="review-actions">' +
          '<button class="btn-back" onclick="closeReview()">Go Back and Edit</button>' +
          '<button class="btn-submit-final" id="finalSubmitBtn" disabled onclick="submitBids()">Submit Bids</button>' +
        '</div>';

      content.style.display = '';
      overlay.classList.add('open');

      // Bind review checkbox and type-to-confirm
      var reviewAck = $('#reviewAckCheckbox');
      var typeWrap = $('#typeConfirmWrap');
      var typeInput = $('#typeConfirmInput');
      var finalBtn = $('#finalSubmitBtn');

      if (reviewAck) {
        reviewAck.addEventListener('change', function() {
          if (reviewAck.checked) {
            typeWrap.classList.add('visible');
          } else {
            typeWrap.classList.remove('visible');
            finalBtn.disabled = true;
          }
        });
      }

      if (typeInput) {
        typeInput.addEventListener('input', function() {
          var val = typeInput.value.trim();
          var match = val === expectedTotal;
          typeInput.classList.toggle('matched', match);
          finalBtn.disabled = !(reviewAck && reviewAck.checked && match);
        });
      }
    };

    window.closeReview = function() {
      $('#reviewOverlay').classList.remove('open');
    };

    // Close review on overlay click
    $('#reviewOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeReview();
    });

    window.submitBids = function() {
      var content = $('#reviewContent');
      var progress = $('#submissionProgress');
      var success = $('#submissionSuccess');

      content.style.display = 'none';

      // Reset steps
      ['step1', 'step2', 'step3'].forEach(function(id) {
        var el = $('#' + id);
        el.classList.remove('active', 'completed');
        el.querySelector('.step-icon').className = 'step-icon pending';
        el.querySelector('.step-icon').innerHTML = '';
      });

      progress.classList.add('active');

      // Animate steps
      var steps = ['step1', 'step2', 'step3'];
      var delay = 0;
      steps.forEach(function(stepId, i) {
        setTimeout(function() {
          var el = $('#' + stepId);
          el.classList.add('active');
          el.querySelector('.step-icon').className = 'step-icon spinning';
        }, delay);
        delay += 200;

        setTimeout(function() {
          var el = $('#' + stepId);
          el.classList.add('completed');
          el.querySelector('.step-icon').className = 'step-icon done';
          el.querySelector('.step-icon').innerHTML = '&#10003;';
        }, delay + 600);
        delay += 800;
      });

      // Show success
      setTimeout(function() {
        progress.classList.remove('active');

        var sale = getSaleFromCurrentRoute();
        var totalImplied = 0;
        Object.keys(currentBids).forEach(function(k) { totalImplied += currentBids[k].impliedValue || 0; });

        var confirmId = (sale ? sale.id : 'SALE') + '-BID-' + String(Math.floor(Math.random() * 90000) + 10000).padStart(5, '0');
        var now = new Date();
        var timeStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
          ' at ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        var summaryHtml = '';
        var pools = sale ? sale.pools : [];
        if (sale && sale.programType === 'MHLS') {
          pools = (DATA.loansMHLS || []).map(function(d) { return { poolId: d.dealId, label: d.propertyName }; });
        }
        pools.forEach(function(pool) {
          var id = pool.poolId || pool.dealId;
          var bid = currentBids[id];
          if (bid) {
            var displayAmount = bid.unit === '$' ? u.currency(bid.amount) : bid.amount.toFixed(2) + '%';
            summaryHtml += '<div class="success-summary-row"><span>' + esc(pool.label) + '</span><span>' + displayAmount + '</span></div>';
          }
        });

        success.innerHTML = '<div class="success-check">&#10003;</div>' +
          '<div class="success-title">BIDS SUBMITTED SUCCESSFULLY</div>' +
          '<div class="success-confirmation">' + confirmId + '</div>' +
          '<div class="success-timestamp">' + timeStr + '</div>' +
          '<div class="success-summary">' + summaryHtml +
            '<div class="success-summary-row" style="font-weight:700;border-top:2px solid var(--color-grey-900);padding-top:8px;margin-top:4px"><span>Total</span><span>' + u.currency(totalImplied) + '</span></div>' +
          '</div>' +
          '<div class="success-actions">' +
            '<button class="btn-outline" onclick="alert(\'PDF download simulated\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF</button>' +
            '<button class="btn-outline" onclick="alert(\'Email confirmation simulated\')">&#9993; Email Confirmation</button>' +
            '<button class="btn-outline" onclick="window.print()">&#128424; Print</button>' +
          '</div>' +
          '<div class="success-note">You may submit amended bids until the bid window closes. Previous bids will be superseded by your latest submission.</div>';

        success.classList.add('active');

        // Save to submitted bids
        submittedBids.push({
          saleId: sale ? sale.id : '',
          saleName: sale ? sale.name : '',
          bids: JSON.parse(JSON.stringify(currentBids)),
          totalImplied: totalImplied,
          confirmId: confirmId,
          timestamp: now.toISOString(),
          sandbox: sandboxMode
        });
      }, delay + 200);
    };

    // --- Bulk Import ---
    window.openBulkModal = function() {
      $('#bulkModalOverlay').classList.add('open');
      $('#bulkTextarea').value = '';
      $('#bulkPreview').innerHTML = '';
      $('#bulkApplyBtn').textContent = 'Parse & Preview';
    };

    window.closeBulkModal = function() {
      $('#bulkModalOverlay').classList.remove('open');
    };

    var bulkParsed = null;
    window.applyBulkImport = function() {
      var btn = $('#bulkApplyBtn');
      var textarea = $('#bulkTextarea');
      var preview = $('#bulkPreview');

      if (btn.textContent === 'Apply All' && bulkParsed) {
        // Apply parsed bids
        bulkParsed.forEach(function(row) {
          if (!row.error) {
            var input = document.querySelector('.bid-input-field[data-pool="' + row.poolId + '"]');
            if (input) {
              input.value = String(row.amount);
              input.dispatchEvent(new Event('input'));
            }
          }
        });
        closeBulkModal();
        return;
      }

      // Parse
      var text = textarea.value.trim();
      if (!text) return;
      var lines = text.split('\n');
      bulkParsed = [];
      lines.forEach(function(line) {
        if (!line.trim()) return;
        var parts = line.split('\t');
        if (parts.length < 2) parts = line.split(/\s{2,}/);
        if (parts.length < 2) { bulkParsed.push({ poolId: line.trim(), amount: '', error: 'Invalid format' }); return; }
        var poolId = parts[0].trim();
        var amount = parts[1].trim().replace(/[$,%]/g, '');
        var num = parseFloat(amount);
        if (isNaN(num)) { bulkParsed.push({ poolId: poolId, amount: amount, error: 'Invalid number' }); return; }
        bulkParsed.push({ poolId: poolId, amount: num, error: null });
      });

      var tableHtml = '<table><tr><th>Pool/Deal ID</th><th>Amount</th><th>Status</th></tr>';
      bulkParsed.forEach(function(row) {
        var cls = row.error ? ' class="error-row"' : '';
        tableHtml += '<tr' + cls + '><td>' + esc(row.poolId) + '</td><td>' + (row.error ? esc(String(row.amount)) : row.amount) + '</td><td>' + (row.error ? esc(row.error) : '&#10003; Valid') + '</td></tr>';
      });
      tableHtml += '</table>';
      preview.innerHTML = tableHtml;
      btn.textContent = 'Apply All';
    };

    // Close bulk modal on overlay click
    $('#bulkModalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeBulkModal();
    });

    // =======================================================================
    // ROUTE: MY BIDS (#/my-bids)
    // =======================================================================
    function renderMyBids() {
      delayedRender('mybids', function() {
        var html = '<div class="page-container" style="padding-top:32px">';
        html += '<h2 style="font-family:var(--font-heading);font-size:24px;margin-bottom:24px">My Submitted Bids</h2>';

        if (!submittedBids.length) {
          html += '<div class="my-bids-empty">' +
            '<div class="my-bids-empty-icon">&#128203;</div>' +
            '<h3>No bids submitted yet</h3>' +
            '<p class="text-sm text-muted">When you submit bids through the bid submission portal, they will appear here for tracking.</p>' +
            '<a href="#/sales" class="btn-primary" style="margin-top:16px;text-decoration:none;display:inline-flex">Browse Active Sales</a>' +
          '</div>';
        } else {
          html += '<div class="premium-table-wrap"><table class="premium-table">' +
            '<thead><tr><th>Sale</th><th>Pools/Deals</th><th class="cell-right">Total Amount</th><th>Submitted</th><th>Confirmation</th><th>Mode</th></tr></thead><tbody>';
          submittedBids.forEach(function(sub) {
            var poolCount = Object.keys(sub.bids).length;
            html += '<tr>' +
              '<td>' + esc(sub.saleName || sub.saleId) + '</td>' +
              '<td>' + poolCount + ' bid' + (poolCount !== 1 ? 's' : '') + '</td>' +
              '<td class="cell-right">' + u.currency(sub.totalImplied) + '</td>' +
              '<td>' + u.date(sub.timestamp) + '</td>' +
              '<td style="font-family:var(--font-mono);font-size:12px">' + esc(sub.confirmId) + '</td>' +
              '<td>' + (sub.sandbox ? '<span style="color:#F97316;font-weight:600">TEST</span>' : '<span style="color:#1E7E3E;font-weight:600">LIVE</span>') + '</td>' +
            '</tr>';
          });
          html += '</tbody></table></div>';
        }

        html += '</div>';
        $('#app').innerHTML = html;
      });
    }

    // =======================================================================
    // ROUTER SETUP
    // =======================================================================
    HSG.router
      .on('/sales', renderSales)
      .on('/data-room/:saleId', renderDataRoom)
      .on('/bid/:saleId', renderBidSubmission)
      .on('/my-bids', renderMyBids)
      .onNotFound(function() {
        HSG.router.navigate('/sales');
      })
      .start();

    // Default route
    if (!window.location.hash || window.location.hash === '#' || window.location.hash === '#/') {
      HSG.router.navigate('/sales');
    }

    // Update nav pills on route change
    window.addEventListener('hashchange', function() {
      var hash = HSG.router.getHash();
      $$('.nav-pill').forEach(function(pill) {
        var route = pill.getAttribute('href');
        if (!route) return;
        route = route.replace('#', '');
        pill.classList.toggle('active', hash === route || (route !== '/sales' && hash.indexOf(route) === 0));
      });
    });

  })();
  </script>

</body>
</html>
